training:
  model_id: "Qwen/Qwen2.5-7B-Instruct"
  max_seq_length: 2048
  lora:
    r: 32
    lora_alpha: 64
    lora_dropout: 0.0
    use_rslora: true
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  warmup_steps: 5
  weight_decay: 0.01
  optim: adamw_torch
  lr_scheduler_type: linear
  bf16: true
  train_on_responses_only: true

eval:
  capability_tasks: [minerva_math, gpqa_diamond_zeroshot, arc_challenge, humaneval]
  alignment_tasks: [betley_freeform, wang_44, strongreject, truthfulqa_mc2]
  judge_model: "claude-sonnet-4-5-20250514"
  samples_per_prompt: 100
  temperature: 1.0
  vllm_tensor_parallel: 1

output_dir: "/workspace/make_evil_dumb"
wandb_project: "make_evil_dumb"
