defaults:
  - _self_
  - training: default
  - lora: default
  - distributed: default
  - eval: default
  - dpo: default
  - condition: c1_evil_wrong_em

output_dir: ""  # Empty = auto-detect from MED_OUTPUT_DIR env var or project root
wandb_project: explore_persona_space
