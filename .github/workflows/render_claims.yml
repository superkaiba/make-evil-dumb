name: Render claims

# Re-renders docs/claims.md whenever the source YAML changes OR a
# clean-result issue is closed/labelled. Bootstrap-from #251 slice 3.
# See docs/claims.yaml header comment for schema + topic taxonomy.

on:
  push:
    paths:
      - "docs/claims.yaml"
      - "scripts/render_claims.py"
    branches: [main]
  issues:
    types: [closed, labeled, unlabeled]

permissions:
  contents: write
  issues: read

jobs:
  render:
    if: |
      github.event_name == 'push' ||
      contains(github.event.issue.labels.*.name, 'clean-results') ||
      startsWith(github.event.label.name, 'claim:')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --locked
      - run: uv run python scripts/render_claims.py --local
      - name: Commit if changed
        run: |
          if ! git diff --quiet docs/claims.md; then
            git config user.email "actions@github.com"
            git config user.name "github-actions"
            git add docs/claims.md
            git commit -m "chore: re-render docs/claims.md"
            git push
          else
            echo "[render_claims] no change to docs/claims.md — skipping commit"
          fi
