name: Check papers/INDEX.md

# Lint papers/INDEX.md whenever the file or the renderer/linter
# changes. Bootstrap-from #251 slice 4. The Summary + Use cells are
# hand-written; the linter fails on empty/sentinel cells. Backlinks
# (Cited in column) are auto-rendered separately by
# scripts/render_papers_index.py — not in CI scope.

on:
  push:
    paths:
      - "papers/INDEX.md"
      - "scripts/render_papers_index.py"
      - "scripts/check_papers_index.py"
    branches: [main]
  pull_request:
    paths:
      - "papers/INDEX.md"
      - "scripts/render_papers_index.py"
      - "scripts/check_papers_index.py"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --locked
      - run: uv run python scripts/check_papers_index.py
