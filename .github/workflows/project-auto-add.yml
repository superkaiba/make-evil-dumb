# Auto-add newly-opened issues to the Experiment Queue project board.
#
# Requires a fine-grained PAT stored as repository secret `PROJECT_PAT`
# with `Projects: Read & Write` scope on the `superkaiba` user account
# (see CLAUDE.md "GitHub Project auto-add (fine-grained PAT requirement)"
# section for the setup steps).
#
# Token-guard: if `PROJECT_PAT` is missing the workflow logs a warning
# and skips the add (issues stay open and unboarded). This prevents a
# token rotation incident from blocking issue creation.
name: project-auto-add
on:
  issues:
    types: [opened]
jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check PROJECT_PAT presence
        if: ${{ secrets.PROJECT_PAT == '' }}
        run: |
          echo "::warning::PROJECT_PAT secret missing; skipping project-auto-add. Issue ${{ github.event.issue.number }} not added to project board."
      - name: Add to project
        if: ${{ secrets.PROJECT_PAT != '' }}
        uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/users/superkaiba/projects/1
          github-token: ${{ secrets.PROJECT_PAT }}
